# ============================================
# 🚀 SneakersForLess CI/CD Pipeline
# ============================================
# This workflow automatically builds and deploys
# the frontend to AWS S3 + CloudFront on push to main

name: Deploy to Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '18'
  AWS_REGION: 'us-east-2'
  S3_BUCKET: 'sneakers-for-less-website'
  CLOUDFRONT_DISTRIBUTION_ID: 'E3B368O9PJ3DSF'

jobs:
  # ============================================
  # Job 1: Build & Test
  # ============================================
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📚 Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🧪 Run linter (if configured)
        working-directory: ./frontend
        run: npm run lint --if-present || true

      - name: 🧪 Run tests (if configured)
        working-directory: ./frontend
        run: npm test --if-present
        continue-on-error: true

      - name: 🏗️ Build production bundle
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          ESLINT_NO_DEV_ERRORS: 'true'
          CI: 'false'

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: frontend/dist
          retention-days: 1

  # ============================================
  # Job 2: Deploy to AWS (only on main branch)
  # ============================================
  deploy:
    name: 🚀 Deploy to AWS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: dist

      - name: 🔧 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🪣 Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html" \
            --exclude "*.json"
          
          # Upload index.html with no-cache for immediate updates
          aws s3 cp dist/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: 🌍 Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: ✅ Deployment complete
        run: |
          echo "🎉 Deployment successful!"
          echo "🌐 Site: https://www.sneakersforless.org"
          echo "⏱️ CloudFront may take 5-10 minutes to fully propagate"

  # ============================================
  # Job 3: Notify on failure (optional)
  # ============================================
  notify-failure:
    name: 🚨 Notify on Failure
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: failure()
    
    steps:
      - name: 🚨 Create failure summary
        run: |
          echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The deployment to production has failed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
