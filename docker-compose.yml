# Local dev stack — DynamoDB Local + web admin UI. Lets you develop/test against
# a real DynamoDB API locally without touching production (us-east-2).
#   docker compose up -d    # DynamoDB :8000, Admin UI :8001
#   docker compose down
# Runs in-memory: local data resets on 'down'. To persist, swap -inMemory for
# '-dbPath /data' plus a volume.
services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: sneakers-dynamodb-local
    ports: ["8000:8000"]
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: sneakers-dynamodb-admin
    ports: ["8001:8001"]
    environment:
      DYNAMO_ENDPOINT: "http://dynamodb-local:8000"
      AWS_REGION: "us-east-2"
      AWS_ACCESS_KEY_ID: "local"
      AWS_SECRET_ACCESS_KEY: "local"
    depends_on: ["dynamodb-local"]
